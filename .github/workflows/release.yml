name: release

# Fires on tags like v0.1.0, v1.2.3-rc.1, v2.0.0+build-42 — same rule
# GitHub Releases uses.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # create a release + upload the tarball
  pages: write     # deploy to GitHub Pages
  id-token: write  # Pages deployment auth

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build lib + docs + demo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tarball-name: ${{ steps.pack.outputs.tarball }}
    steps:
      - name: Checkout sql-git
        uses: actions/checkout@v4
        with:
          path: sql-git

      - name: Checkout sql-reactive-orm sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sql-reactive-orm
          path: sql-reactive-orm

      - name: Checkout sql-read-tracking sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sql-read-tracking
          path: sql-read-tracking

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: sql-git/pnpm-lock.yaml

      - name: Install
        working-directory: sql-git
        run: pnpm install --frozen-lockfile

      - name: Pack library tarball
        id: pack
        working-directory: sql-git
        run: |
          mkdir -p dist-release
          pnpm pack --pack-destination dist-release
          TARBALL=$(ls dist-release/*.tgz | head -n1)
          echo "tarball=$(basename "$TARBALL")" >> "$GITHUB_OUTPUT"
          echo "Tarball: $TARBALL"

      - name: Build VitePress docs
        working-directory: sql-git/docs
        env:
          # GitHub Pages serves the project site at /<repo>/ — VitePress
          # uses this as its base. If you rename the repo, override here.
          DOCS_BASE: /${{ github.event.repository.name }}/
        run: pnpm build

      - name: Build demo-opfs2
        working-directory: sql-git/demo-opfs2
        env:
          # Vite will hash assets relative to this base.
          BASE_URL: /${{ github.event.repository.name }}/demo/
        run: pnpm build --base /${{ github.event.repository.name }}/demo/

      - name: Assemble Pages artifact
        working-directory: sql-git
        run: |
          mkdir -p pages-dist
          cp -R docs/.vitepress/dist/. pages-dist/
          mkdir -p pages-dist/demo
          cp -R demo-opfs2/dist/. pages-dist/demo/
          # SPA-fallback: copy index.html so direct links under /demo/
          # resolve when Vite's router client-side-routes.
          cp demo-opfs2/dist/index.html pages-dist/demo/404.html || true

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: sql-git-tarball
          path: sql-git/dist-release/*.tgz
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sql-git/pages-dist

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sql-git-tarball
          path: ./tarball

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: tarball/*.tgz
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            pnpm add 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ needs.build.outputs.tarball-name }}'
            ```

            Docs: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
            Demo: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/demo/

  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 10
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
