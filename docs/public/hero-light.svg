<svg viewBox="0 0 440 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three peer action logs rebasing onto a SQLite master">
  <defs>
    <linearGradient id="dbBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g fill="none" stroke-width="3" stroke-linecap="round">
    <path d="M 40,80 L 200,80 Q 244,80 264,140 L 284,180" stroke="#3b82f6"/>
    <path d="M 40,180 L 284,180" stroke="#8b5cf6"/>
    <path d="M 40,280 L 200,280 Q 244,280 264,220 L 284,180" stroke="#14b8a6"/>
  </g>

  <g>
    <circle cx="40" cy="80" r="7" fill="#3b82f6"/>
    <circle cx="100" cy="80" r="7" fill="#3b82f6"/>
    <circle cx="160" cy="80" r="7" fill="#3b82f6"/>

    <circle cx="40" cy="180" r="7" fill="#8b5cf6"/>
    <circle cx="100" cy="180" r="7" fill="#8b5cf6"/>
    <circle cx="160" cy="180" r="7" fill="#8b5cf6"/>
    <circle cx="220" cy="180" r="7" fill="#8b5cf6"/>

    <circle cx="40" cy="280" r="7" fill="#14b8a6"/>
    <circle cx="100" cy="280" r="7" fill="#14b8a6"/>
    <circle cx="160" cy="280" r="7" fill="#14b8a6"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">
    <text x="40" y="60" text-anchor="middle">alice</text>
    <text x="40" y="164" text-anchor="middle">bob</text>
    <text x="40" y="304" text-anchor="middle">carol</text>
  </g>

  <circle cx="284" cy="180" r="18" fill="#1e40af" opacity="0.12"/>
  <circle cx="284" cy="180" r="11" fill="#1e40af"/>
  <text x="284" y="154" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1e40af">rebase</text>

  <line x1="295" y1="180" x2="332" y2="180" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>

  <g transform="translate(332, 128)" filter="url(#softShadow)">
    <ellipse cx="36" cy="12" rx="36" ry="12" fill="#3b82f6"/>
    <path d="M 0,12 L 0,92 A 36,12 0 0 0 72,92 L 72,12" fill="url(#dbBody)"/>
    <ellipse cx="36" cy="12" rx="36" ry="12" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
    <path d="M 0,40 A 36,12 0 0 0 72,40" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.3"/>
    <path d="M 0,68 A 36,12 0 0 0 72,68" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.3"/>
    <text x="36" y="58" text-anchor="middle" fill="white" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="700">master</text>
    <text x="36" y="78" text-anchor="middle" fill="white" font-size="9" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" opacity="0.75">SQLite</text>
  </g>
</svg>
